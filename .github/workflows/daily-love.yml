name: Daily Love

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's photo and caption
        env:
          SMUGMUG_API_KEY: ${{ secrets.SMUGMUG_API_KEY }}
          SMUGMUG_API_SECRET: ${{ secrets.SMUGMUG_API_SECRET }}
          SMUGMUG_ACCESS_TOKEN: ${{ secrets.SMUGMUG_ACCESS_TOKEN }}
          SMUGMUG_ACCESS_TOKEN_SECRET: ${{ secrets.SMUGMUG_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive.html daily-log.json rotation-state.json images/daily/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily photo and caption [skip ci]"
            git push
          fi
